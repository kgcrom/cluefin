pre-commit:
  parallel: true
  commands:
    python-lint:
      glob: "*.py"
      run: uv run ruff format --check {staged_files} && uv run ruff check {staged_files}
    node-lint:
      glob: "*.{ts,tsx,js}"
      root: "packages/cluefin-openapi-ts/"
      run: npx biome check {staged_files}

pre-push:
  parallel: true
  commands:
    python-test:
      glob: "*.py"
      run: uv run pytest -m "not integration and not slow" --tb=short -q
    node-test:
      glob: "*.{ts,tsx,js}"
      root: "packages/cluefin-openapi-ts/"
      run: npm run test:unit
