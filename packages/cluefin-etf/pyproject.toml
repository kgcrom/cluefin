[project]
name = "cluefin-etf"
version = "0.1.0"
description = "ETF page scraping scaffolds for Korean asset managers"
readme = "README.md"
authors = [
    { name = "Hangoo Kang", email = "kgcrom@hotmail.com" }
]
requires-python = ">=3.10"
dependencies = [
    "beautifulsoup4>=4.12.0",
    "playwright>=1.52.0",
    "pydantic>=2.12.0,<3.0.0",
    "requests>=2.32.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
extend = "../../pyproject.toml"
include = ["examples/**", "src/**", "tests/**"]
